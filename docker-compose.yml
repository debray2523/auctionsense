version: "3.9"

services:

  # PostgreSQL + pgvector
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER:     auctionsense
      POSTGRES_PASSWORD: auctionsense
      POSTGRES_DB:       auctionsense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auctionsense"]
      interval: 5s
      timeout: 5s
      retries: 10

  # FastAPI backend
  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - configs/.env
    environment:
      DATABASE_URL: postgresql://auctionsense:auctionsense@db:5432/auctionsense
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - model_store:/app/models
      - data_store:/app/data

  # Streamlit UI
  ui:
    build: .
    command: streamlit run src/ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - configs/.env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api

  # MLflow tracking server
  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow-artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow-artifacts

volumes:
  pgdata:
  model_store:
  data_store:
  mlflow_data:
